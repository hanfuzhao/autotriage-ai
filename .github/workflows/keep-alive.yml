name: keep-alive

# Pings the deployed Space's /health endpoint so the demo stays awake for the
# grading window. Set the SPACE_URL repository variable to your Space URL.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.SPACE_URL }}"
          if [ -z "$URL" ]; then echo "SPACE_URL not set; skipping"; exit 0; fi
          echo "Pinging $URL/health"
          curl -sSf --max-time 30 "$URL/health" || echo "ping failed (Space may be waking)"
